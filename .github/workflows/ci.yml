name: CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.ref != 'main' &&
       github.event.pull_request.head.ref != 'release')
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            # Extracts 'release' from 'refs/heads/release'
            BRANCH=$(echo "${{ github.ref }}" | sed 's|refs/heads/||')
          fi
          echo "Detected branch: $BRANCH"
          if [ "$BRANCH" == "release" ]; then
            echo 'matrix=["ubuntu-latest", "windows-2022", "macos-latest"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.prepare.outputs.matrix) }}
        include:
          - os: ubuntu-latest
            qt_arch: gcc_64
            embedded_cli: ON
          - os: windows-2022
            qt_arch: win64_msvc2019_64
            embedded_cli: ON
          - os: macos-latest
            qt_arch: clang_64
            embedded_cli: OFF

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: ${{ matrix.qt_arch }}

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - name: Configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DSPRAT_EMBEDDED_CLI=${{ matrix.embedded_cli }}

      - name: Build
        run: cmake --build build --config Release

      - name: Install Python test dependencies
        run: pip install Pillow

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: |
          export PATH="$PATH:$(pwd)/build"
          ctest --test-dir build --output-on-failure -C Release

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "$env:PATH;$(Get-Location)\build\Release;$env:Qt6_DIR\bin"
          ctest --test-dir build --output-on-failure -C Release

      - name: Package (Linux)
        if: runner.os == 'Linux' && github.ref == 'refs/heads/release'
        run: |
          set -euo pipefail
          mkdir dist
          cp build/sprat-gui dist/
          # CLI is embedded in the exe (SPRAT_EMBEDDED_CLI=ON); copy bundled assets.
          cp build/spratprofiles.cfg dist/
          cp -r build/transforms dist/
          tar -czf sprat-gui-linux.tar.gz -C dist .

          # Create AppImage
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp build/sprat-gui AppDir/usr/bin/
          cp build/spratprofiles.cfg AppDir/usr/bin/
          cp -r build/transforms AppDir/usr/bin/
          cp deploy/linux/sprat-gui.desktop AppDir/usr/share/applications/
          cp assets/icons/layout-svgrepo-com.svg AppDir/usr/share/icons/hicolor/scalable/apps/sprat-gui.svg
          APPIMAGE_EXTRACT_AND_RUN=1 \
            ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage
          find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy*' \
            -exec mv {} sprat-gui-linux.AppImage \;

      - name: Package (Windows)
        if: runner.os == 'Windows' && github.ref == 'refs/heads/release'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          mkdir dist
          # CLI is embedded in the exe (SPRAT_EMBEDDED_CLI=ON for Windows builds);
          # no separate CLI download needed.
          Copy-Item -Path build/bin/Release/sprat-gui.exe -Destination dist/ -Force
          # Deploy Qt DLLs and plugins next to the exe.
          # --release:                 release DLLs only
          # --no-opengl-sw:            skip software OpenGL renderer (not needed for Qt Widgets)
          # --no-system-d3d-compiler:  skip D3D compiler DLL
          # MSVC runtime is included by default (no --no-compiler-runtime)
          windeployqt --release --no-opengl-sw --no-system-d3d-compiler dist/sprat-gui.exe
          Compress-Archive -Path dist/* -DestinationPath sprat-gui-windows.zip

      - name: Package (macOS)
        if: runner.os == 'macOS' && github.ref == 'refs/heads/release'
        run: |
          set -euo pipefail
          mkdir dist
          cp -r build/sprat-gui.app dist/
          # Bundle sprat-cli (read version from DEPENDENCIES) into the App Bundle
          cli_version=$(cat DEPENDENCIES | xargs)
          curl -fL -o cli.dmg "https://github.com/pedroac/sprat-cli/releases/download/$cli_version/sprat-cli-macos-x64.dmg"
          MOUNT_POINT=$(hdiutil mount cli.dmg | grep -o '/Volumes/.*' | head -n 1)
          if [ -z "$MOUNT_POINT" ]; then echo "Failed to mount DMG"; exit 1; fi
          cp -r "$MOUNT_POINT"/* dist/sprat-gui.app/Contents/MacOS/
          hdiutil unmount "$MOUNT_POINT"
          # Package DMG
          macdeployqt dist/sprat-gui.app -dmg
          mv dist/sprat-gui.dmg sprat-gui-macos.dmg
          # Package ZIP for in-app auto-update
          cd dist && zip -r ../sprat-gui-macos.zip sprat-gui.app

      - name: Upload Artifacts
        if: github.ref == 'refs/heads/release'
        uses: actions/upload-artifact@v4
        with:
          name: sprat-gui-${{ runner.os }}
          path: |
            sprat-gui-linux.tar.gz
            sprat-gui-linux.AppImage
            sprat-gui-windows.zip
            sprat-gui-macos.dmg
            sprat-gui-macos.zip

  build-wasm:
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/release') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      EM_CACHE: ${{ github.workspace }}/build_wasm/emsdk_cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt WASM
        uses: jurplel/install-qt-action@v3
        continue-on-error: true
        with:
          version: '6.6.3'
          arch: 'wasm_multithread'

      - name: Check Qt WASM availability
        id: check_qt_wasm
        run: |
          QT_WASM=$(find "$HOME/Qt" -maxdepth 3 -type d -name 'wasm_multithread' 2>/dev/null | head -1)
          if [ -z "$QT_WASM" ]; then
            echo "Qt WASM not found, skipping WASM build"
            echo "wasm_available=false" >> $GITHUB_OUTPUT
          else
            echo "Qt WASM found at: $QT_WASM"
            echo "wasm_available=true" >> $GITHUB_OUTPUT
            echo "qt_wasm_path=$QT_WASM" >> $GITHUB_OUTPUT
          fi

      - name: Setup Emscripten 4.0.7
        if: steps.check_qt_wasm.outputs.wasm_available == 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.7'
          actions-cache-folder: 'emsdk-cache'

      - name: Build EGL stub
        if: steps.check_qt_wasm.outputs.wasm_available == 'true'
        run: |
          mkdir -p build_wasm/wasm_deps build_wasm/emsdk_cache/symbol_lists
          emcc wasm/egl_stub.c -c -o build_wasm/wasm_deps/egl_stub.o
          emar rcs build_wasm/wasm_deps/libegl.a build_wasm/wasm_deps/egl_stub.o

      - name: Configure WASM
        if: steps.check_qt_wasm.outputs.wasm_available == 'true'
        run: |
          QT_WASM="${{ steps.check_qt_wasm.outputs.qt_wasm_path }}"
          emcmake cmake -B build_wasm -S . \
            -DCMAKE_PREFIX_PATH="$QT_WASM" \
            -DCMAKE_FIND_ROOT_PATH="$QT_WASM" \
            -DCMAKE_MODULE_PATH="$QT_WASM/lib/cmake/Qt6" \
            -DSPRAT_WASM_DEBUG=OFF \
            -DSPRAT_WASM_JSPI=OFF \
            -DEGL_INCLUDE_DIR="$(em-config EMSCRIPTEN_ROOT)/system/include" \
            -DEGL_LIBRARY="$(pwd)/build_wasm/wasm_deps/libegl.a" \
            -DCMAKE_CXX_FLAGS="-DNDEBUG -DEMSCRIPTEN_DISABLE_ASSERTS=1" \
            -DCMAKE_C_FLAGS="-DNDEBUG -DEMSCRIPTEN_DISABLE_ASSERTS=1"

      - name: Build WASM
        if: steps.check_qt_wasm.outputs.wasm_available == 'true'
        run: |
          export EMFLAGS="-sASSERTIONS=0"
          cmake --build build_wasm --parallel

      - name: Package WASM
        if: steps.check_qt_wasm.outputs.wasm_available == 'true'
        run: |
          mkdir sprat-gui-web
          cp build_wasm/sprat-gui.{js,wasm,data} \
             build_wasm/qtloader.js \
             sprat-gui-web/
          cp deploy/sprat-gui-itch/index.html sprat-gui-web/index.html
          zip -r sprat-gui-web.zip sprat-gui-web/

      - name: Upload WASM artifact
        if: steps.check_qt_wasm.outputs.wasm_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sprat-gui-wasm
          path: sprat-gui-web.zip

      - name: WASM build skipped
        if: steps.check_qt_wasm.outputs.wasm_available != 'true'
        run: echo "⚠️ Qt WASM not available in aqtinstall, skipping WASM build"

  deploy-itchio:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    needs: [build, build-wasm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "tag=$(cat VERSION | xargs)" >> $GITHUB_OUTPUT

      - name: Download butler
        run: |
          curl -fsSL -o butler.zip \
            "https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip"
          unzip butler.zip
          chmod +x linux-amd64/butler
          ln -s linux-amd64/butler butler
          ./butler -V

      - name: Download WASM artifact
        continue-on-error: true
        id: download_wasm
        uses: actions/download-artifact@v4
        with:
          name: sprat-gui-wasm
          path: dist

      - name: Extract and push WASM to itch.io
        if: steps.download_wasm.outcome == 'success'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          unzip dist/sprat-gui-web.zip -d .
          ./butler push sprat-gui-web/ pedroac/sprat:web \
            --userversion ${{ steps.version.outputs.tag }}

      - name: Download Linux artifact
        continue-on-error: true
        id: download_linux
        uses: actions/download-artifact@v4
        with:
          name: sprat-gui-Linux
          path: dist

      - name: Push Linux AppImage to itch.io
        if: steps.download_linux.outcome == 'success'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          mkdir -p linux-itch
          cp dist/sprat-gui-linux.AppImage linux-itch/
          cp deploy/linux/.itch.toml linux-itch/
          ./butler push linux-itch/ pedroac/sprat:linux \
            --userversion ${{ steps.version.outputs.tag }}

      - name: Download Windows artifact
        continue-on-error: true
        id: download_windows
        uses: actions/download-artifact@v4
        with:
          name: sprat-gui-Windows
          path: dist

      - name: Push Windows to itch.io
        if: steps.download_windows.outcome == 'success'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          mkdir -p windows-itch
          unzip dist/sprat-gui-windows.zip -d windows-itch/
          cp deploy/windows/.itch.toml windows-itch/
          ./butler push windows-itch/ pedroac/sprat:windows \
            --userversion ${{ steps.version.outputs.tag }}

      - name: Download macOS artifact
        continue-on-error: true
        id: download_macos
        uses: actions/download-artifact@v4
        with:
          name: sprat-gui-macOS
          path: dist

      - name: Push macOS to itch.io
        if: steps.download_macos.outcome == 'success'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          mkdir -p macos-itch
          unzip dist/sprat-gui-macos.zip -d macos-itch/
          cp deploy/macos/.itch.toml macos-itch/
          ./butler push macos-itch/ pedroac/sprat:osx \
            --userversion ${{ steps.version.outputs.tag }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | xargs)
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            dist/sprat-gui-linux.tar.gz
            dist/sprat-gui-linux.AppImage
            dist/sprat-gui-windows.zip
            dist/sprat-gui-macos.dmg
            dist/sprat-gui-macos.zip
            dist/sprat-gui-web.zip
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
