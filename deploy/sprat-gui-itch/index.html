<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>sprat-gui</title>
    <style>
      /* Make the html body cover the entire (visual) viewport with no scroll bars. */
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100% }
      #screen {
        width: 100%;
        height: 100%;
        scroll-margin-top: 100vh;
        /* Prevent scroll chaining to parent page when scrolling inside the app.
           Works well on Chrome/Chromium. Firefox support is incomplete but improving. */
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body onload="init()">
    <figure style="overflow:visible;" id="qtspinner">
      <center style="margin-top:1.5em; line-height:150%">
        <img src="qtlogo.svg" width="320" height="200" style="display:block"></img>
        <strong>Qt for WebAssembly: sprat-gui</strong>
        <div id="qtstatus"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>
    <div id="screen"></div>

    <script type="text/javascript">
        // itch.io embed scroll-prevention
        // -----------------------------------------------------------------------
        // Problem 1 – scroll-to-top on outside click:
        //   Qt WASM calls canvas.focus() whenever it receives a blur event, trying
        //   to keep keyboard input. A cross-iframe focus() call tells the browser
        //   to scroll the *parent* page to bring the iframe into view.
        //   preventScroll:true only suppresses scrolling within this iframe's own
        //   document; it does not stop the parent page from scrolling.
        //   Fix: track whether this iframe has user focus. While it does not,
        //   suppress all focus() calls so the parent page is never asked to scroll.
        //
        // Problem 2 – parent page scrolls on wheel:
        //   Wheel events inside the iframe bubble to the parent, scrolling the
        //   itch.io page instead of (or in addition to) the Qt canvas.
        //   Fix: consume every wheel event at the window level.
        // -----------------------------------------------------------------------
        (function () {
            // Suppress focus() calls until the user explicitly clicks inside the
            // iframe. Starting true prevents Qt's canvas.focus() during startup
            // from scrolling the parent page before the user has interacted.
            let suppressFocus = true;

            const _origFocus = HTMLElement.prototype.focus;
            HTMLElement.prototype.focus = function (options) {
                if (suppressFocus) return;
                // preventScroll:true suppresses any intra-iframe scrolling too.
                _origFocus.call(this, Object.assign({}, options, { preventScroll: true }));
            };

            // Iframe lost focus → user clicked somewhere outside.
            window.addEventListener('blur', function () {
                suppressFocus = true;
            });

            // The ONLY way to re-enable focus is an explicit pointerdown inside
            // the iframe. We intentionally do NOT listen for window 'focus' here:
            // that event fires during page load (when the iframe becomes active)
            // which would reset suppressFocus to false before Qt's startup
            // canvas.focus() runs and cause the parent page to scroll.
            // capture:true ensures our handler fires before Qt's pointerdown handler.
            window.addEventListener('pointerdown', function () {
                suppressFocus = false;
            }, { capture: true });

            // Wheel scroll blocking is now handled by CSS overscroll-behavior: none
            // in the #screen element style, which prevents scroll chaining to parent.
        })();

        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading...';

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.sprat_gui_entry,
                        containerElements: [screen],

                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="sprat-gui.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>
